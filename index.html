<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title> E‑commerce</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <style>
      * {
        font-family: "Poppins", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #a8a59e 0%, #d4710e 100%);
        scroll-behavior: smooth;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #8d8080;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: #865c32;
        border-radius: 10px;
      }

      /* Navbar */
      .navbar {
        background: rgba(214, 200, 200, 0.95) !important;
        backdrop-filter: blur(10px);
        box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
      }
      .navbar-brand {
        font-weight: 800;
        font-size: 1.8rem;
        background: linear-gradient(135deg, #2c1810, #c7a17a);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent !important;
        letter-spacing: -0.5px;
      }
      .cart-badge {
        background: linear-gradient(135deg, #c7a17a, #a67c52);
        color: rgb(66, 177, 84);
        border-radius: 50px;
        padding: 0.2rem 0.6rem;
        font-size: 0.7rem;
        font-weight: 600;
        margin-left: 6px;
      }
      /* Category Tabs */
      .category-wrapper {
        background: rgb(185, 28, 28);
        border-radius: 60px;
        padding: 5px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        display: inline-flex;
        gap: 8px;
      }
      .cat-btn {
        border-radius: 50px;
        padding: 0.7rem 1.8rem;
        font-weight: 600;
        transition: all 0.3s ease;
        border: none;
        background: transparent;
        color: #07d3a7;
      }
      .cat-btn i {
        margin-right: 8px;
      }
      .cat-btn.active {
        background: linear-gradient(135deg, #2c1810, #5c3d2e);
        color: white;
        box-shadow: 0 5px 15px rgba(44, 24, 16, 0.3);
        transform: scale(1.02);
      }
      .cat-btn:hover:not(.active) {
        background: #f5ebe4;
        transform: translateY(-2px);
      }
      /* Product Cards */
      .product-card {
        border: none;
        border-radius: 24px;
        background: rgb(194, 48, 48);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        height: 100%;
      }
      .product-card:hover {
        transform: translateY(-12px);
        box-shadow: 0 25px 40px rgba(0, 0, 0, 0.12);
      }
      .card-img-top {
        height: 260px;
        object-fit: cover;
        transition: transform 0.5s ease;
      }
      .product-card:hover .card-img-top {
        transform: scale(1.05);
      }
      .badge-custom {
        position: absolute;
        top: 15px;
        left: 15px;
        background: linear-gradient(135deg, #c7a17a, #a67c52);
        color: rgb(187, 23, 23);
        padding: 5px 12px;
        border-radius: 30px;
        font-size: 0.7rem;
        font-weight: 600;
        z-index: 2;
      }
      .price-tag {
        font-size: 1.6rem;
        font-weight: 700;
        color: #2c1810;
      }
      .btn-add {
        background: linear-gradient(135deg, #2c1810, #5c3d2e);
        border: none;
        border-radius: 40px;
        padding: 0.7rem;
        font-weight: 600;
        transition: all 0.3s;
        color: rgb(45, 201, 25);
      }
      .btn-add:hover {
        transform: scale(0.96);
        background: linear-gradient(135deg, #1f110a, #4a2f23);
      }
      /* Cart Sidebar */
      .cart-sidebar {
        position: fixed;
        top: 0;
        right: -450px;
        width: 420px;
        max-width: 90vw;
        height: 100vh;
        background: lab(100% 0.01 -0.01);
        box-shadow: -10px 0 40px rgba(0, 0, 0, 0.15);
        z-index: 1060;
        transition: right 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        display: flex;
        flex-direction: column;
        border-left: 1px solid rgba(199, 161, 122, 0.2);
      }
      .cart-sidebar.open {
        right: 0;
      }
      .cart-header {
        background: linear-gradient(135deg, #2c1810, #5c3d2e);
        color: rgb(196, 47, 47);
        padding: 1.3rem 1.5rem;
      }
      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 1.2rem;
      }
      .cart-item {
        background: #fef9f0;
        border-radius: 16px;
        padding: 12px;
        margin-bottom: 12px;
        transition: 0.2s;
      }
      .cart-item-img {
        width: 65px;
        height: 65px;
        object-fit: cover;
        border-radius: 14px;
      }
      .overlay-blur {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        z-index: 1050;
        visibility: hidden;
        opacity: 0;
        transition: 0.25s;
      }
      .overlay-blur.active {
        visibility: visible;
        opacity: 1;
      }
      /* Toast */
      .toast-custom {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #2c1810;
        color: white;
        padding: 12px 24px;
        border-radius: 60px;
        font-weight: 500;
        z-index: 1100;
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      .toast-custom.show {
        opacity: 1;
      }
      /* Auth Modal */
      .modal-content {
        border-radius: 32px;
        border: none;
        overflow: hidden;
      }
      .auth-header {
        background: linear-gradient(135deg, #2c1810, #5c3d2e);
        padding: 25px;
        text-align: center;
        color: white;
      }
      /* Hero Section */
      .hero-section {
        background: linear-gradient(135deg, #fef5ed 0%, #ffe8db 100%);
        border-radius: 0 0 50px 50px;
        padding: 50px 0;
      }
      /* Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-up {
        animation: fadeInUp 0.6s ease forwards;
      }
      .user-greeting {
        background: #f5ebe4;
        padding: 6px 15px;
        border-radius: 40px;
        font-weight: 500;
        color: #2c1810;
      }
      footer {
        background: #2c1810;
        color: #d4c5b5;
      }
    </style>
  </head>
  <body>
    <!-- Overlay & Toast -->
    <div class="overlay-blur" id="overlay"></div>
    <div id="toastMsg" class="toast-custom">
      <i class="fas fa-heart"></i> <span id="toastText">Welcome!</span>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top py-3">
      <div class="container">
        <a class="navbar-brand" href="#"
          ><i ></i>FashionHub</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center gap-3">
            <li class="nav-item" id="authNavItem">
              <button
                class="btn btn-outline-dark rounded-pill px-4"
                id="loginRegisterBtn"
                style="border-color: #c7a17a; color: #2c1810"
              >
                <i class="fas fa-user-circle me-2"></i>Sign In
              </button>
            </li>
            <li class="nav-item" id="userGreetingItem" style="display: none">
              <span class="user-greeting" id="userGreetingText"></span>
              <button
                class="btn btn-sm btn-outline-danger rounded-pill ms-2"
                id="logoutBtn"
              >
                Logout
              </button>
            </li>
            <li class="nav-item">
              <button
                class="btn btn-dark rounded-pill px-4 position-relative"
                id="cartIconBtn"
                style="background: #2c1810"
              >
                <i class="fas fa-shopping-bag me-2"></i> Cart
                <span id="cartCountBadge" class="cart-badge">0</span>
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
      <div class="container text-center py-4">
        <h1 class="display-4 fw-bold" style="color: #2c1810" data-aos="fade-up">
          E-Commerce <span style="color: #c7a17a">Website</span>
        </h1>
        <p
          class="lead text-secondary mt-3"
          data-aos="fade-up"
          data-aos-delay="100"
        >
          Discover curated collections for Men, Women & Kids timeless design.
        </p>
      </div>
    </section>

    <!-- Category Filter & Products -->
    <div class="container mt-5">
      <div class="d-flex justify-content-center mb-5">
        <div class="category-wrapper" data-aos="fade-up">
          <button class="cat-btn active" data-section="gents">
            <i class="fas fa-user-tie"></i> Gents
          </button>
          <button class="cat-btn" data-section="ladies">
            <i class="fas fa-female"></i> Ladies
          </button>
          <button class="cat-btn" data-section="children">
            <i class="fas fa-child"></i> Children
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="sectionTitle" class="fw-bold" style="color: #2c1810">
          👔 Gents Collection
        </h2>
        <span class="text-muted small"
          ><i class="fas fa-sync-alt"></i> Real-time cart</span
        >
      </div>

      <div class="row g-4" id="productContainer">
        <!-- Products injected -->
      </div>
    </div>

    <footer class="mt-5 py-5 text-center">
      <div class="container">
        <p class="mb-0">
          © E-Commerce Website
          <i class="fas fa-heart text-danger"></i>
        </p>
      </div>
    </footer>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar">
      <div
        class="cart-header d-flex justify-content-between align-items-center"
      >
        <span><i class="fas fa-shopping-bag me-2"></i> Your Shopping Bag</span>
        <button
          id="closeCartBtn"
          class="btn btn-sm text-white bg-transparent border-0 fs-4"
        >
          &times;
        </button>
      </div>
      <div id="cartItemsList" class="cart-items">
        <div class="text-center text-muted mt-5">
          <i class="fas fa-shopping-cart fa-3x mb-3 opacity-50"></i><br />Cart
          is empty
        </div>
      </div>
      <div class="cart-footer p-3 border-top">
        <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
          <span>Total:</span>
          <span id="cartTotalPrice" style="color: #c7a17a"> $0.00</span>
        </div>
        <button
          id="checkoutBtn"
          class="btn w-100 py-2 mb-2"
          style="background: #2c1810; color: white; border-radius: 40px"
        >
          <i class="fas fa-credit-card"></i> Secure Checkout
        </button>
        <button
          id="clearCartBtn"
          class="btn btn-outline-secondary w-100 py-2"
          style="border-radius: 40px"
        >
          <i class="fas fa-trash-alt"></i> Clear Cart
        </button>
      </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal fade" id="authModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="auth-header">
            <i class="fas fa-crown fs-1 mb-2"></i>
            <h3 id="authModalTitle" class="mb-0">Welcome Back</h3>
          </div>
          <div class="modal-body p-4">
            <form id="authForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <input
                  type="email"
                  class="form-control rounded-pill"
                  id="authEmail"
                  placeholder="hello@fashionhub.com"
                  required
                  style="padding: 12px 20px"
                />
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input
                  type="password"
                  class="form-control rounded-pill"
                  id="authPassword"
                  placeholder="••••••"
                  required
                  style="padding: 12px 20px"
                />
              </div>
              <div
                id="authErrorMsg"
                class="text-danger small mb-3 text-center"
              ></div>
              <button
                type="submit"
                class="btn w-100 py-2 rounded-pill fw-semibold"
                id="authSubmitBtn"
                style="background: #2c1810; color: white"
              >
                Sign In
              </button>
            </form>
            <div class="text-center mt-3">
              <span
                id="authToggleText"
                class="text-decoration-none"
                style="color: #c7a17a; cursor: pointer; font-weight: 500"
                >Don't have an account? Register</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 800, once: true });

      // ---------- PRODUCT DATABASE with high-quality realistic images ----------
      const PRODUCTS_DB = {
        gents: [

              "https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=400&h=500&fit=crop",

          {

          },

          },
        ],
        ladies: [
          {

              "https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=400&h=500&fit=crop",
            section: "ladies",
            badge: "New Arrival",
          },
          {
            id: 202,
            name: "Elegant Handbag",
            price: 99.99,
            image:
              "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=400&h=500&fit=crop",
            section: "ladies",
            badge: "Trending",
          },
          {
            id: 203,
            name: "High Heel Sandals",
            price: 89.99,
            image:
              "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=400&h=500&fit=crop",
            section: "ladies",
            badge: "",
          },
          {
            id: 204,
            name: "Cashmere Scarf",
            price: 49.99,
            image:
              "https://images.unsplash.com/photo-1601924994987-69e26d50dc26?w=400&h=500&fit=crop",
            section: "ladies",
            badge: "Cozy",
          },
        ],
        children: [
          {
            id: 301,
            name: "Kids Denim Jacket",
            price: 54.99,
            image:
              "https://images.unsplash.com/photo-1622290291468-a28e7a7dc6a1?w=400&h=500&fit=crop",
            section: "children",
            badge: "Cute",
          },
          {
            id: 302,
            name: "Colorful Sneakers",
            price: 44.99,
            image:
              "https://images.unsplash.com/photo-1514989940723-e8e51635b782?w=400&h=500&fit=crop",
            section: "children",
            badge: "Lightweight",
          },
          {
            id: 303,
            name: "Backpack Dino",
            price: 39.99,
            image:
              "https://images.unsplash.com/photo-1600102973635-d1b4e3c8f1e2?w=400&h=500&fit=crop",
            section: "children",
            badge: "Fun",
          },
          {
            id: 304,
            name: "Graphic Tee Set",
            price: 29.99,
            image:
              "https://images.unsplash.com/photo-1518834107812-67b0b7c58434?w=400&h=500&fit=crop",
            section: "children",
            badge: "2-Pack",
          },
        ],
      };

      let currentSection = "gents";
      let loggedInUser = null;
      let cart = [];

      // Helper: Toast
      function showToast(message, icon = "fas fa-check-circle") {
        const toast = document.getElementById("toastMsg");
        document.getElementById("toastText").innerHTML =
          `<i class="${icon} me-2"></i>${message}`;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // ---------- AUTH SYSTEM ----------
      function getUsers() {
        return JSON.parse(localStorage.getItem("fashionUsers") || "{}");
      }
      function saveUsers(users) {
        localStorage.setItem("fashionUsers", JSON.stringify(users));
      }

      function loadCartForUser() {
        if (!loggedInUser) {
          cart = [];
          updateCartDisplay();
          return;
        }
        const carts = JSON.parse(
          localStorage.getItem("userCartsFashion") || "{}",
        );
        cart = carts[loggedInUser] || [];
        updateCartDisplay();
      }

      function saveCartToUser() {
        if (!loggedInUser) return;
        const carts = JSON.parse(
          localStorage.getItem("userCartsFashion") || "{}",
        );
        carts[loggedInUser] = cart;
        localStorage.setItem("userCartsFashion", JSON.stringify(carts));
      }

      function updateCartDisplay() {
        if (loggedInUser) saveCartToUser();
        const totalQty = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById("cartCountBadge").innerText = totalQty;
        renderCartSidebar();
      }

      function addToCart(product) {
        if (!loggedInUser) {
          showToast("Please login to add items!", "fas fa-lock");
          const authModal = new bootstrap.Modal(
            document.getElementById("authModal"),
          );
          authModal.show();
          return false;
        }
        const exist = cart.find((i) => i.id === product.id);
        if (exist) {
          exist.quantity += 1;
          showToast(`${product.name} quantity +1`, "fas fa-plus-circle");
        } else {
          cart.push({ ...product, quantity: 1 });
          showToast(`${product.name} added to bag`, "fas fa-shopping-bag");
        }
        updateCartDisplay();
        return true;
      }

      function updateQty(id, delta) {
        const idx = cart.findIndex((i) => i.id === id);
        if (idx !== -1) {
          const newQty = cart[idx].quantity + delta;
          if (newQty <= 0) cart.splice(idx, 1);
          else cart[idx].quantity = newQty;
          updateCartDisplay();
          showToast("Cart updated", "fas fa-sync-alt");
        }
      }

      function removeItem(id) {
        cart = cart.filter((i) => i.id !== id);
        updateCartDisplay();
        showToast("Item removed", "fas fa-trash-alt");
      }
      function clearCart() {
        if (cart.length) {
          cart = [];
          updateCartDisplay();
          showToast("Cart cleared", "fas fa-broom");
        } else showToast("Cart already empty", "fas fa-info-circle");
      }

      function renderCartSidebar() {
        const container = document.getElementById("cartItemsList");
        const totalSpan = document.getElementById("cartTotalPrice");
        if (!container) return;
        if (cart.length === 0) {
          container.innerHTML = `<div class="text-center text-muted mt-5"><i class="fas fa-bag-shopping fa-3x mb-3 opacity-50"></i><p>Your bag is empty</p></div>`;
          totalSpan.innerText = "$0.00";
          return;
        }
        let html = "",
          total = 0;
        cart.forEach((item) => {
          total += item.price * item.quantity;
          html += `
        <div class="cart-item d-flex gap-3 align-items-center">
          <img src="${item.image}" class="cart-item-img">
          <div class="flex-grow-1"><h6 class="mb-0 fw-bold">${item.name}</h6><small>$${item.price}</small>
          <div class="mt-2 d-flex gap-2"><button class="btn btn-sm btn-outline-secondary rounded-circle decr-cart" data-id="${item.id}">−</button><span class="fw-bold">${item.quantity}</span><button class="btn btn-sm btn-outline-secondary rounded-circle incr-cart" data-id="${item.id}">+</button><button class="btn btn-sm text-danger remove-cart" data-id="${item.id}"><i class="fas fa-trash"></i></button></div></div>
          <div class="fw-bold" style="color:#c7a17a;">$${(item.price * item.quantity).toFixed(2)}</div>
        </div>`;
        });
        container.innerHTML = html;
        totalSpan.innerText = `$${total.toFixed(2)}`;
        document
          .querySelectorAll(".decr-cart")
          .forEach((btn) =>
            btn.addEventListener("click", (e) =>
              updateQty(parseInt(btn.dataset.id), -1),
            ),
          );
        document
          .querySelectorAll(".incr-cart")
          .forEach((btn) =>
            btn.addEventListener("click", (e) =>
              updateQty(parseInt(btn.dataset.id), 1),
            ),
          );
        document
          .querySelectorAll(".remove-cart")
          .forEach((btn) =>
            btn.addEventListener("click", (e) =>
              removeItem(parseInt(btn.dataset.id)),
            ),
          );
      }

      function renderProducts(section) {
        const products = PRODUCTS_DB[section];
        const container = document.getElementById("productContainer");
        const titles = {
          gents: "👔 Gents Collection",
          ladies: "👗 Ladies Collection",
          children: "🧸 Children's Collection",
        };
        document.getElementById("sectionTitle").innerHTML = titles[section];
        if (!container) return;
        let html = "";
        products.forEach((p) => {
          html += `
        <div class="col-md-6 col-lg-3" data-aos="fade-up" data-aos-delay="100">
          <div class="product-card">
            <div class="position-relative"><img src="${p.image}" class="card-img-top"><span class="badge-custom">${p.badge || "New"}</span></div>
            <div class="card-body p-4">
              <h5 class="fw-bold">${p.name}</h5>
              <div class="price-tag my-2">$${p.price}</div>
              <button class="btn-add w-100 addBtn" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" data-image="${p.image}" data-section="${p.section}"><i class="fas fa-cart-plus me-2"></i>Add to Cart</button>
            </div>
          </div>
        </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll(".addBtn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const product = {
              id: parseInt(btn.dataset.id),
              name: btn.dataset.name,
              price: parseFloat(btn.dataset.price),
              image: btn.dataset.image,
              section: btn.dataset.section,
            };
            addToCart(product);
          });
        });
      }

      // Auth functions
      function handleRegister(email, pwd) {
        const users = getUsers();
        if (users[email])
          return { success: false, msg: "Email already exists." };
        users[email] = { password: pwd };
        saveUsers(users);
        const carts = JSON.parse(
          localStorage.getItem("userCartsFashion") || "{}",
        );
        if (!carts[email]) carts[email] = [];
        localStorage.setItem("userCartsFashion", JSON.stringify(carts));
        return { success: true, msg: "Registered! Please login." };
      }
      function handleLogin(email, pwd) {
        const users = getUsers();
        if (!users[email])
          return { success: false, msg: "User not found. Register first." };
        if (users[email].password !== pwd)
          return { success: false, msg: "Wrong password." };
        loggedInUser = email;
        localStorage.setItem("currentFashionUser", email);
        loadCartForUser();
        updateAuthUI();
        renderProducts(currentSection);
        return { success: true, msg: `Welcome back, ${email.split("@")[0]}!` };
      }
      function logout() {
        loggedInUser = null;
        localStorage.removeItem("currentFashionUser");
        cart = [];
        updateCartDisplay();
        updateAuthUI();
        renderProducts(currentSection);
        showToast("Logged out successfully", "fas fa-sign-out-alt");
      }
      function updateAuthUI() {
        const authNav = document.getElementById("authNavItem");
        const userDiv = document.getElementById("userGreetingItem");
        const userText = document.getElementById("userGreetingText");
        if (loggedInUser) {
          authNav.style.display = "none";
          userDiv.style.display = "flex";
          userText.innerText = `✨ ${loggedInUser.split("@")[0]}`;
        } else {
          authNav.style.display = "block";
          userDiv.style.display = "none";
        }
      }

      // Modal Logic
      let isLogin = true;
      const authModal = new bootstrap.Modal(
        document.getElementById("authModal"),
      );
      const authForm = document.getElementById("authForm");
      const authModalTitle = document.getElementById("authModalTitle");
      const authSubmitBtn = document.getElementById("authSubmitBtn");
      const authToggleText = document.getElementById("authToggleText");
      const authError = document.getElementById("authErrorMsg");
      function switchMode() {
        isLogin = !isLogin;
        authModalTitle.innerText = isLogin ? "Welcome Back" : "Join FashionHub";
        authSubmitBtn.innerText = isLogin ? "Sign In" : "Create Account";
        authToggleText.innerText = isLogin
          ? "Don't have an account? Register"
          : "Already have an account? Login";
        authError.innerText = "";
      }
      authForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("authEmail").value.trim();
        const pwd = document.getElementById("authPassword").value;
        if (!email || !pwd) {
          authError.innerText = "All fields required";
          return;
        }
        let res;
        if (isLogin) res = handleLogin(email, pwd);
        else res = handleRegister(email, pwd);
        if (res.success) {
          authModal.hide();
          showToast(res.msg, "fas fa-star");
          authForm.reset();
          if (!isLogin) switchMode();
        } else authError.innerText = res.msg;
      });
      authToggleText.addEventListener("click", switchMode);
      document
        .getElementById("loginRegisterBtn")
        .addEventListener("click", () => {
          isLogin = true;
          switchMode();
          authForm.reset();
          authError.innerText = "";
          authModal.show();
        });
      document.getElementById("logoutBtn").addEventListener("click", logout);

      // Category switching
      document.querySelectorAll(".cat-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".cat-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentSection = btn.dataset.section;
          renderProducts(currentSection);
        });
      });

      // Cart sidebar events
      const cartSidebar = document.getElementById("cartSidebar");
      const overlay = document.getElementById("overlay");
      document.getElementById("cartIconBtn").addEventListener("click", () => {
        cartSidebar.classList.add("open");
        overlay.classList.add("active");
        renderCartSidebar();
      });
      document.getElementById("closeCartBtn").addEventListener("click", () => {
        cartSidebar.classList.remove("open");
        overlay.classList.remove("active");
      });
      overlay.addEventListener("click", () => {
        cartSidebar.classList.remove("open");
        overlay.classList.remove("active");
      });
      document
        .getElementById("clearCartBtn")
        .addEventListener("click", clearCart);
      document.getElementById("checkoutBtn").addEventListener("click", () => {
        if (!loggedInUser) {
          showToast("Please login to checkout", "fas fa-lock");
          authModal.show();
          return;
        }
        if (cart.length === 0) showToast("Cart is empty", "fas fa-info-circle");
        else {
          showToast("🎉 Order placed! Thank you for shopping.", "fas fa-gift");
          cart = [];
          updateCartDisplay();
          cartSidebar.classList.remove("open");
          overlay.classList.remove("active");
        }
      });

      // Initialize
      const savedUser = localStorage.getItem("currentFashionUser");
      if (savedUser && getUsers()[savedUser]) {
        loggedInUser = savedUser;
        loadCartForUser();
      } else {
        loggedInUser = null;
        cart = [];
        updateCartDisplay();
      }
      updateAuthUI();
      renderProducts("gents");
    </script>
  </body>
</html>
